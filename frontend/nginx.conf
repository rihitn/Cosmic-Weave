server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 実在するファイルはそのまま返す（tutorial.html など）
    location ~* \.(html|js|css|png|ico|svg|woff2?)$ {
        try_files $uri =404;
    }

    # それ以外は SPA にフォールバック
    location / {
        try_files $uri /index.html;
    }

    error_page 404 /index.html;
}