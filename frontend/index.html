<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Cosmic Weave</title>
    <link rel="stylesheet" href="./src/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="screen-overlay"></div>

    <header>
      <div class="header-logo" onclick="location.href='/index.html'" style="cursor:pointer">
        <img src="/CosmicWeaveLogo.png" />
      </div>
      <button class="add-urls-button"></button>
      <div class="right-button">
        <a href="/tutorial.html" class="login-button" style="text-decoration:none">?</a>
        <button class="menu-button">menu</button>
        <button id="auth-btn" class="login-button">login</button>
      </div>
    </header>

    <div class="hud-wrapper">
      <div id="zoom-display">Zoom: 100%</div>
      <div class="url-counter">Stars: 0</div>
      <div class="my-stars-counter">My Stars: 0</div>
      <div class="fav-counter">Favorites: 0</div>
    </div>

    <div id="url-display"></div>

    <!-- Add URL / Search form -->
    <div class="add-urls-form" id="add-urls-form">
      <div class="search-form">
        <h3 class="strings">Search</h3>
        <input type="text" id="search-input" placeholder="キーワードを入力して検索" autocomplete="off" />
        <div id="search-results" class="search-results"></div>
      </div>

      <!-- タブ -->
      <div class="url-tabs">
        <button class="url-tab active" data-tab="single">単体</button>
        <button class="url-tab" data-tab="bulk">一括</button>
      </div>

      <!-- 単体追加 -->
      <div class="url-form" id="tab-single">
        <input
          type="url"
          id="url"
          placeholder="https://example.com"
          required
          pattern="https?://.*"
          autocomplete="off"
        />
        <div id="url-preview" class="url-preview"></div>
        <button class="addUrl-button">add</button>
        <div class="kbd-hint">/ で開く &nbsp;·&nbsp; Esc で閉じる</div>
      </div>

      <!-- 一括追加 -->
      <div class="url-form" id="tab-bulk" style="display:none">
        <textarea
          id="bulk-urls"
          class="bulk-textarea"
          placeholder="URLを1行に1つずつ入力&#10;https://example.com&#10;https://another.com"
          rows="6"
        ></textarea>
        <div id="bulk-status" class="url-preview"></div>
        <button class="addUrl-button" id="bulk-add-btn">一括追加</button>
      </div>
    </div>

    <!-- Menu (right panel) -->
    <div class="menu" id="menu">
      <div class="added-urls-list">
        <ul id="url-list"></ul>
      </div>
    </div>

    <!-- Star info popup -->
    <div class="star-popup" id="star-popup">
      <div class="popup-header">
        <h3 class="popup-title" id="popup-title"></h3>
        <button class="popup-close" id="popup-close">✕</button>
      </div>
      <a class="popup-url-link" id="popup-url" target="_blank" rel="noopener"></a>
      <div class="popup-fav-status" id="popup-fav-status"></div>
      <div class="popup-actions">
        <button class="popup-open-btn" id="popup-open">開く →</button>
        <button class="popup-fav-btn" id="popup-fav-toggle"></button>
      </div>
    </div>

    <script type="module" src="/src/star.js"></script>
    <script type="module" src="/src/menu.js"></script>
    <script type="module">
      import { initAuth } from '/src/auth.js';
      initAuth();
    </script>
  </body>
</html>
