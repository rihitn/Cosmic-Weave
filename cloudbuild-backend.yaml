steps:
  # 1. Dockerイメージをビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cosmic-weave-backend', '-f', 'Dockerfile-backend', '.']

  # 2. イメージをGoogle Container Registryにプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cosmic-weave-backend']

  # 3. Cloud Runにデプロイ（環境変数を直接設定）
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cosmic-weave-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/cosmic-weave-backend'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'SUPABASE_URL=https://aluhxbxlhszfceftzdtp.supabase.co,SUPABASE_KEY=REMOVED_SUPABASE_SERVICE_KEY,OPENAI_API_KEY=REMOVED_OPENAI_KEY'

images:
  - 'gcr.io/$PROJECT_ID/cosmic-weave-backend'

options:
  logging: CLOUD_LOGGING_ONLY